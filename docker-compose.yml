services:
  frontend:
    image: ${ECR_REGISTRY}/nihongo-frontend:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - shared_net
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/nihongo-backend:${IMAGE_TAG:-latest}
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
    networks:
      - shared_net
    restart: unless-stopped

networks:
  shared_net:
    external: true
    name: nihongo-learning-app
